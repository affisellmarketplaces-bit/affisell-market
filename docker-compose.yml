services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: affisell
      POSTGRES_PASSWORD: affisell
      POSTGRES_DB: affisell
    volumes:
      - affisell_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affisell -d affisell"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Market Intelli V2 (separate DB to avoid colliding with Affisell Market dev DB).
  marketintelli_db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: marketintelli
      POSTGRES_PASSWORD: marketintelli
      POSTGRES_DB: marketintelli
    volumes:
      - marketintelli_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketintelli -d marketintelli"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  affisell_pg_data:
  redis_data:
  marketintelli_pg_data:
