name: Lighthouse mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse-home:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify PWA shell wiring
        run: npm run verify:pwa-shell

      - name: Lighthouse mobile (home)
        id: lighthouse
        continue-on-error: true
        run: npm run lighthouse:mobile
        env:
          # Optional — enables LHCI GitHub status checks when configured in repo secrets.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Publish Lighthouse summary
        if: always()
        run: node scripts/lighthouse-ci-summary.mjs

      - name: Comment Lighthouse on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs")
            if (!fs.existsSync("lighthouse-summary.md")) return
            const body = fs.readFileSync("lighthouse-summary.md", "utf8")
            const marker = "<!-- affisell-lighthouse-mobile -->"
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find((c) => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      - name: Fail on severe Lighthouse regression
        if: steps.lighthouse.outcome == 'failure'
        run: |
          echo "Severe Lighthouse regression — see summary / PR comment."
          exit 1
