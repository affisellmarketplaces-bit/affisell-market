name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify package-lock.json is in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          if ! git diff --quiet package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' locally and commit package-lock.json."
            git diff --stat package-lock.json
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test
