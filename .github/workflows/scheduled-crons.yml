name: Scheduled crons

# Vercel Hobby crons are once/day — run ops jobs via GitHub Actions.
on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  frequent:
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger frequent cron routes
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$VERCEL_APP_URL" ]; then
            echo "Set GitHub secrets CRON_SECRET and VERCEL_APP_URL"
            exit 1
          fi
          BASE="${VERCEL_APP_URL%/}"
          AUTH="Authorization: Bearer ${CRON_SECRET}"
          for path in \
            "/api/cron/sentinel-scan" \
            "/api/cron/enforce-supplier-ship-sla" \
            "/api/cron/sync-supplier-orders" \
            "/api/cron/expire-sponsor-campaigns" \
            "/api/cron/process-order-payouts" \
            "/api/cron/release-booking-holds" \
            "/api/cron/booking-reminders" \
            "/api/cron/booking-waitlist-notify" \
            "/api/cron/agent-mission-reminders" \
            "/api/cron/expansion-ops" \
            "/api/cron/reconcile-checkout-orders" \
            "/api/cron/sync-autods" \
            "/api/cron/sync-store-vercel-domains" \
            "/api/cron/retry-pending-clawback" \
            "/api/cron/abandoned-cart"
          do
            echo "→ GET ${path}"
            curl -fsS -H "$AUTH" "${BASE}${path}" || echo "WARN: ${path} failed"
          done

  daily:
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily cron routes
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$VERCEL_APP_URL" ]; then
            echo "Set GitHub secrets CRON_SECRET and VERCEL_APP_URL"
            exit 1
          fi
          BASE="${VERCEL_APP_URL%/}"
          AUTH="Authorization: Bearer ${CRON_SECRET}"
          for path in \
            "/api/cron/migrate" \
            "/api/cron/review-early-nudge" \
            "/api/cron/review-reminder" \
            "/api/cron/repurchase-reminder" \
            "/api/cron/custom-domain-nudge" \
            "/api/cron/wishlist-price-alerts" \
            "/api/cron/adjust-variant-pricing" \
            "/api/cron/stripe-health" \
            "/api/cron/booking-supplier-digest" \
            "/api/cron/expansion-digest" \
            "/api/cron/refresh-supplier-trust-scores" \
            "/api/cron/brand-pulse-nudge" \
            "/api/cron/onboarding"
          do
            echo "→ GET ${path}"
            curl -fsS -H "$AUTH" "${BASE}${path}" || echo "WARN: ${path} failed"
          done

  reconcile-payouts:
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger payout reconciliation cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$VERCEL_APP_URL" ]; then
            echo "Set GitHub secrets CRON_SECRET and VERCEL_APP_URL"
            exit 1
          fi
          BASE="${VERCEL_APP_URL%/}"
          AUTH="Authorization: Bearer ${CRON_SECRET}"
          echo "→ GET /api/cron/reconcile"
          curl -fsS -H "$AUTH" "${BASE}/api/cron/reconcile"
  weekly:
    if: github.event.schedule == '0 9 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly Brand OS cron routes
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$VERCEL_APP_URL" ]; then
            echo "Set GitHub secrets CRON_SECRET and VERCEL_APP_URL"
            exit 1
          fi
          BASE="${VERCEL_APP_URL%/}"
          AUTH="Authorization: Bearer ${CRON_SECRET}"
          for path in \
            "/api/cron/brand-pulse-weekly-digest" \
            "/api/cron/brand-preset-ab-winner" \
            "/api/cron/brand-pulse-stagnation-ab"
          do
            echo "→ GET ${path}"
            curl -fsS -H "$AUTH" "${BASE}${path}" || echo "WARN: ${path} failed"
          done
